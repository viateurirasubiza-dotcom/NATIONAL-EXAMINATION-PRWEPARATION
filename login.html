<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | National Prep Rwanda</title>


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;

}


body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0057d9,#00a8ff);

}



.box{

background:white;

width:380px;

padding:35px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

}



h1{

text-align:center;

color:#0057d9;

margin-bottom:25px;

}



input{

width:100%;

padding:15px;

margin:10px 0;

border:1px solid #ccc;

border-radius:10px;

}



button{

width:100%;

padding:15px;

background:#0057d9;

color:white;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

}



button:hover{

background:#003b99;

}



a{

display:block;

text-align:center;

margin-top:20px;

color:#0057d9;

}



</style>

</head>


<body>



<div class="box">


<h1>
🔐 Login
</h1>



<input id="email"
placeholder="Email">



<input id="password"
type="password"
placeholder="Password">



<button onclick="login()">

Login

</button>



<a href="register.html">

Create new account

</a>


</div>







<script>


function login(){



let saved=
JSON.parse(
localStorage.getItem("student")
);



let email=
document.getElementById("email").value;


let password=
document.getElementById("password").value;





if(
saved &&
email==saved.email &&
password==saved.password
){



localStorage.setItem(
"loggedIn",
"true"
);



alert(
"Welcome "+saved.name
);



window.location="dashboard.html";



}

else{


alert(
"Wrong email or password"
);


}



}



</script>


</body>

</html>
