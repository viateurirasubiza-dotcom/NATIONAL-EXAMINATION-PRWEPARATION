<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | National Prep Rwanda</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0057d9,#3f8cff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:380px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
    text-align:center;
    font-size:28px;
    color:#0057d9;
    font-weight:bold;
}

.subtitle{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

.password-box{
    position:relative;
}

.password-box span{
    position:absolute;
    right:15px;
    top:18px;
    cursor:pointer;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#0057d9;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#003f9e;
}

.options{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#0057d9;
}

.register{
    text-align:center;
    margin-top:20px;
}

.register a{
    color:#0057d9;
    text-decoration:none;
    font-weight:bold;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
🇷🇼 National Prep Rwanda
</div>

<p class="subtitle">
Login to your account
</p>

<form onsubmit="return login()">

<input type="email" id="email" placeholder="Email Address">

<div class="password-box">
<input type="password" id="password" placeholder="Password">
<span onclick="togglePassword()">👁</span>
</div>

<div class="options">
<label><input type="checkbox"> Remember Me</label>
<a href="#">Forgot Password?</a>
</div>

<button type="submit">
Login
</button>

<div class="error" id="error"></div>

</form>

<div class="register">
Don't have an account?
<a href="register.html">Create Account</a>
</div>

</div>

<script>

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type=="password"){
pass.type="text";
}else{
pass.type="password";
}

}

function login(){

let email=document.getElementById("email").value.trim();

let password=document.getElementById("password").value.trim();

let error=document.getElementById("error");

if(email==""){
error.innerHTML="Please enter your email.";
return false;
}

if(password==""){
error.innerHTML="Please enter your password.";
return false;
}

error.style.color="green";
error.innerHTML="Login successful! Redirecting...";

setTimeout(function(){

window.location="dashboard.html";

},1500);

return false;

}

</script>

</body>
</html>
