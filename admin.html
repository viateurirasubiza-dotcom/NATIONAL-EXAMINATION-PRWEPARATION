<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel | National Prep Rwanda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:#f4f8ff;

}


header{

background:#0057d9;
color:white;
padding:20px;

display:flex;
justify-content:space-between;
align-items:center;

}


header button{

background:white;
color:#0057d9;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;

}



.container{

width:90%;
margin:30px auto;

}



.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}



.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:
0 5px 15px rgba(0,0,0,.1);

}



.card h2{

color:#0057d9;

}



.form{

background:white;

padding:30px;

margin-top:30px;

border-radius:15px;

box-shadow:
0 5px 15px rgba(0,0,0,.1);

}



input,select,textarea{

width:100%;

padding:12px;

margin:10px 0;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

}



textarea{

height:120px;

}



button{

background:#0057d9;

color:white;

border:none;

padding:12px 20px;

border-radius:8px;

cursor:pointer;

}



button:hover{

background:#003b95;

}



table{

width:100%;

background:white;

border-collapse:collapse;

margin-top:20px;

}



th{

background:#0057d9;

color:white;

padding:12px;

}



td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;

}



.delete{

background:red;

}



footer{

background:#111;

color:white;

text-align:center;

padding:20px;

margin-top:40px;

}



.dark{

background:#111;

color:white;

}


.dark .card,
.dark .form,
.dark table{

background:#222;
color:white;

}


</style>


</head>

<body>


<header>

<h2>
👨‍💼 National Prep Rwanda Admin
</h2>


<button onclick="darkMode()">
🌙
</button>


</header>




<div class="container">



<div class="cards">


<div class="card">

<h2 id="subjectsCount">
0
</h2>

<p>
Subjects
</p>

</div>



<div class="card">

<h2 id="examCount">
0
</h2>

<p>
National Exams
</p>

</div>



<div class="card">

<h2 id="questionCount">
0
</h2>

<p>
Questions
</p>

</div>



</div>






<div class="form">


<h2>
📄 Add National Examination
</h2>



<select id="examSubject">

<option>
Mathematics
</option>

<option>
English
</option>

<option>
Physics
</option>

<option>
Chemistry
</option>

<option>
Biology
</option>

</select>



<input id="year"
placeholder="Exam Year e.g 2025">


<input id="pdf"
placeholder="PDF File Name e.g math2025.pdf">


<button onclick="addExam()">

Save Exam

</button>



</div>







<div class="form">


<h2>
📝 Add Question
</h2>



<select id="qSubject">

<option>
Mathematics
</option>

<option>
Physics
</option>

<option>
Chemistry
</option>

</select>



<textarea id="question"
placeholder="Write Question">

</textarea>



<input id="answer"
placeholder="Correct Answer">


<textarea id="explanation"
placeholder="Explanation">

</textarea>



<button onclick="addQuestion()">

Save Question

</button>


</div>







<h2 style="margin-top:40px">

📚 Saved National Exams

</h2>



<table>


<thead>

<tr>

<th>
Subject
</th>

<th>
Year
</th>

<th>
PDF
</th>

<th>
Action
</th>

</tr>


</thead>


<tbody id="examTable">


</tbody>


</table>







<h2 style="margin-top:40px">

❓ Saved Questions

</h2>



<table>


<thead>

<tr>

<th>
Subject
</th>

<th>
Question
</th>

<th>
Answer
</th>

<th>
Action
</th>

</tr>


</thead>


<tbody id="questionTable">


</tbody>


</table>




</div>





<footer>

© 2026 National Prep Rwanda Admin Panel

</footer>






<script>


let exams =
JSON.parse(localStorage.getItem("exams"))
|| [];



let questions =
JSON.parse(localStorage.getItem("questions"))
|| [];






function addExam(){


let data={

subject:
document.getElementById("examSubject").value,

year:
document.getElementById("year").value,

pdf:
document.getElementById("pdf").value

};



exams.push(data);


localStorage.setItem(
"exams",
JSON.stringify(exams)
);


display();


alert("Exam Added");


}






function addQuestion(){


let data={

subject:
document.getElementById("qSubject").value,

question:
document.getElementById("question").value,

answer:
document.getElementById("answer").value,

explanation:
document.getElementById("explanation").value

};



questions.push(data);


localStorage.setItem(
"questions",
JSON.stringify(questions)
);



display();


alert("Question Added");


}







function display(){


let examHTML="";


exams.forEach((e,i)=>{


examHTML+=`

<tr>

<td>${e.subject}</td>

<td>${e.year}</td>

<td>${e.pdf}</td>

<td>

<button class="delete"
onclick="deleteExam(${i})">

Delete

</button>

</td>


</tr>

`;

});


document.getElementById("examTable")
.innerHTML=examHTML;








let qHTML="";


questions.forEach((q,i)=>{


qHTML+=`

<tr>

<td>${q.subject}</td>

<td>${q.question}</td>

<td>${q.answer}</td>


<td>

<button class="delete"
onclick="deleteQuestion(${i})">

Delete

</button>

</td>


</tr>


`;

});


document.getElementById("questionTable")
.innerHTML=qHTML;





document.getElementById("examCount")
.innerHTML=exams.length;


document.getElementById("questionCount")
.innerHTML=questions.length;


}








function deleteExam(i){

exams.splice(i,1);

localStorage.setItem(
"exams",
JSON.stringify(exams)
);

display();

}





function deleteQuestion(i){

questions.splice(i,1);

localStorage.setItem(
"questions",
JSON.stringify(questions)
);

display();

}





function darkMode(){

document.body.classList.toggle("dark");

}



display();


</script>


</body>

</html>
