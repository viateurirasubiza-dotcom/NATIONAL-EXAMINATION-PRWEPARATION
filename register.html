<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | National Prep Rwanda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0057d9,#00a8ff);

}


.box{

background:white;

width:400px;

padding:35px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

}



h1{

text-align:center;

color:#0057d9;

margin-bottom:25px;

}



input,select{

width:100%;

padding:14px;

margin:10px 0;

border-radius:10px;

border:1px solid #ccc;

font-size:16px;

}



button{

width:100%;

padding:15px;

background:#0057d9;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

font-size:18px;

}



button:hover{

background:#003b99;

}



a{

display:block;

text-align:center;

margin-top:20px;

color:#0057d9;

}



</style>

</head>


<body>



<div class="box">


<h1>
🇷🇼 Create Account
</h1>



<input id="name"
placeholder="Full Name">



<input id="email"
placeholder="Email">



<input id="password"
type="password"
placeholder="Password">



<select id="level">

<option>
P6
</option>

<option>
S3
</option>

<option>
S6
</option>

</select>




<button onclick="register()">

Register

</button>



<a href="login.html">

Already have account? Login

</a>



</div>





<script>


function register(){


let student={


name:
document.getElementById("name").value,


email:
document.getElementById("email").value,


password:
document.getElementById("password").value,


level:
document.getElementById("level").value


};




if(
student.name=="" ||
student.email=="" ||
student.password==""
){

alert("Fill all fields");

return;

}



localStorage.setItem(

"student",

JSON.stringify(student)

);



alert(
"Account created successfully"
);



window.location="login.html";



}


</script>



</body>

</html>
