<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | National Prep Rwanda</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#0057d9,#4da3ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#fff;
    width:420px;
    max-width:100%;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    color:#0057d9;
    font-size:28px;
    font-weight:bold;
}

.subtitle{
    text-align:center;
    color:#666;
    margin:10px 0 25px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:bold;
    color:#333;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.password-box{
    position:relative;
}

.password-box span{
    position:absolute;
    right:15px;
    top:13px;
    cursor:pointer;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#0057d9;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#003f9e;
}

.message{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:20px;
}

.footer a{
    color:#0057d9;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
🇷🇼 National Prep Rwanda
</div>

<p class="subtitle">
Create your student account
</p>

<form onsubmit="return registerStudent()">

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name">

<label>Email Address</label>
<input type="email" id="email" placeholder="example@gmail.com">

<label>Level</label>
<select id="level">
<option value="">Select Level</option>
<option>P6</option>
<option>S3</option>
<option>S6</option>
</select>

<label>Password</label>
<div class="password-box">
<input type="password" id="password" placeholder="Password">
<span onclick="togglePassword('password')">👁</span>
</div>

<label>Confirm Password</label>
<div class="password-box">
<input type="password" id="confirm" placeholder="Confirm Password">
<span onclick="togglePassword('confirm')">👁</span>
</div>

<button type="submit">
Create Account
</button>

<div class="message" id="message"></div>

</form>

<div class="footer">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

<script>

function togglePassword(id){

let input=document.getElementById(id);

if(input.type==="password"){
input.type="text";
}else{
input.type="password";
}

}

function registerStudent(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let level=document.getElementById("level").value;
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;

let msg=document.getElementById("message");

msg.style.color="red";

if(name===""){
msg.innerHTML="Please enter your full name.";
return false;
}

if(email===""){
msg.innerHTML="Please enter your email.";
return false;
}

if(level===""){
msg.innerHTML="Please select your level.";
return false;
}

if(password.length<6){
msg.innerHTML="Password must contain at least 6 characters.";
return false;
}

if(password!==confirm){
msg.innerHTML="Passwords do not match.";
return false;
}

// Temporary Local Storage
const student={
name:name,
email:email,
level:level,
password:password
};

localStorage.setItem("student",JSON.stringify(student));

msg.style.color="green";
msg.innerHTML="Account created successfully! Redirecting to login...";

setTimeout(function(){
window.location="login.html";
},1500);

return false;

}

</script>

</body>
</html>
