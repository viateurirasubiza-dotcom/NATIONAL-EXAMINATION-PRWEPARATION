<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Notes | National Prep Rwanda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f8ff;
}


header{

background:#0057d9;
color:white;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;

}


header a{

color:white;
text-decoration:none;
margin-left:20px;

}



.hero{

background:linear-gradient(135deg,#0057d9,#4da3ff);
color:white;
text-align:center;
padding:60px 20px;

}


.hero h1{

font-size:45px;

}



.filters{

width:90%;
margin:30px auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}



input,select{

padding:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;

}




.notes{

width:90%;
margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:25px;

}



.card{

background:white;
padding:25px;
border-radius:15px;

box-shadow:
0 5px 15px rgba(0,0,0,.1);

}



.card h3{

color:#0057d9;

}



button{

background:#0057d9;
color:white;

border:none;

padding:12px 20px;

border-radius:8px;

cursor:pointer;

margin-top:15px;

}



button:hover{

background:#003b99;

}




footer{

background:#111;
color:white;

text-align:center;

padding:20px;

margin-top:50px;

}




.dark{

background:#111;
color:white;

}


.dark .card{

background:#222;
color:white;

}


</style>


</head>


<body>



<header>


<h2>
🇷🇼 National Prep Rwanda
</h2>


<nav>


<a href="dashboard.html">
Dashboard
</a>


<a href="subjects.html">
Subjects
</a>


<span onclick="darkMode()" style="cursor:pointer">

🌙

</span>


</nav>


</header>





<section class="hero">


<h1>

Study Notes

</h1>


<p>

Learn concepts before taking exams

</p>


</section>







<div class="filters">


<input 
id="search"
placeholder="🔍 Search Notes..."
onkeyup="displayNotes()"
>



<select id="subject" onchange="displayNotes()">


<option value="All">

All Subjects

</option>


<option>
Mathematics
</option>


<option>
Physics
</option>


<option>
Chemistry
</option>


<option>
Biology
</option>


<option>
English
</option>


<option>
Computer Science
</option>


</select>





<select id="level" onchange="displayNotes()">


<option value="All">

All Levels

</option>


<option>
P6
</option>


<option>
S3
</option>


<option>
S6
</option>



</select>



</div>









<div class="notes" id="notes">


</div>









<footer>


<h3>
National Prep Rwanda
</h3>


<p>
Prepare Today • Pass Tomorrow
</p>


</footer>








<script>




let notes=[


{

title:"Algebra and Equations",

subject:"Mathematics",

level:"S3",

file:"algebra.pdf"

},



{

title:"Calculus Basics",

subject:"Mathematics",

level:"S6",

file:"calculus.pdf"

},



{

title:"Mechanics",

subject:"Physics",

level:"S6",

file:"mechanics.pdf"

},



{

title:"Chemical Reactions",

subject:"Chemistry",

level:"S3",

file:"chemistry.pdf"

},



{

title:"Human Biology",

subject:"Biology",

level:"S3",

file:"biology.pdf"

},



{

title:"Programming Fundamentals",

subject:"Computer Science",

level:"S6",

file:"programming.pdf"

}


];







function displayNotes(){


let search=

document.getElementById("search")
.value
.toLowerCase();



let subject=

document.getElementById("subject")
.value;



let level=

document.getElementById("level")
.value;



let html="";




notes.filter(n=>{


return (

n.title.toLowerCase()
.includes(search)

&&

(subject=="All" || n.subject==subject)

&&

(level=="All" || n.level==level)

);


}).forEach(n=>{


html+=`

<div class="card">


<h3>
📚 ${n.title}
</h3>


<p>
Subject: ${n.subject}
</p>


<p>
Level: ${n.level}
</p>


<button onclick="downloadNote('${n.file}')">

⬇ Download Notes

</button>


</div>

`;



});



document.getElementById("notes")
.innerHTML=html;


}






function downloadNote(file){


window.open(
"notes/"+file
);


}



function darkMode(){

document.body.classList.toggle("dark");

}




displayNotes();



</script>



</body>

</html>
