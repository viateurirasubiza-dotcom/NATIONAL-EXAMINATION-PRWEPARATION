<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Past Papers | National Prep Rwanda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:#f4f8ff;

}



header{

background:#0057d9;

color:white;

padding:18px 8%;

display:flex;

justify-content:space-between;

align-items:center;

}



header a{

color:white;

text-decoration:none;

margin-left:20px;

}



.hero{

background:linear-gradient(135deg,#0057d9,#4da3ff);

color:white;

text-align:center;

padding:60px 20px;

}



.hero h1{

font-size:45px;

}



.controls{

width:90%;

margin:30px auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}



input,select{

padding:15px;

border-radius:10px;

border:1px solid #ccc;

font-size:16px;

}




.container{

width:90%;

margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:25px;

}



.card{

background:white;

padding:25px;

border-radius:15px;

box-shadow:
0 5px 15px rgba(0,0,0,.1);

}



.card h3{

color:#0057d9;

}



.card p{

margin:12px 0;

}



button{

background:#0057d9;

color:white;

border:none;

padding:12px 20px;

border-radius:8px;

cursor:pointer;

margin:5px;

}



button:hover{

background:#003b99;

}



footer{

background:#111;

color:white;

text-align:center;

padding:20px;

margin-top:50px;

}




.dark{

background:#111;

color:white;

}



.dark .card{

background:#222;

color:white;

}



</style>

</head>



<body>



<header>

<h2>
🇷🇼 National Prep Rwanda
</h2>


<nav>

<a href="dashboard.html">
Dashboard
</a>

<a href="subjects.html">
Subjects
</a>


<span onclick="darkMode()" style="cursor:pointer">
🌙
</span>


</nav>


</header>





<section class="hero">


<h1>

Previous National Examinations

</h1>


<p>

Practice with real exams from previous years

</p>


</section>







<div class="controls">


<input 
id="search"
placeholder="🔍 Search Exam..."
onkeyup="display()"
>


<select id="subjectFilter" onchange="display()">

<option value="All">
All Subjects
</option>

<option>
Mathematics
</option>

<option>
English
</option>

<option>
Physics
</option>

<option>
Chemistry
</option>

<option>
Biology
</option>

</select>




<select id="yearFilter" onchange="display()">


<option value="All">
All Years
</option>

<option>
2025
</option>

<option>
2024
</option>

<option>
2023
</option>

<option>
2022
</option>

<option>
2021
</option>


</select>


</div>







<div class="container" id="papers">


</div>







<footer>

<h3>
National Prep Rwanda
</h3>


<p>
Prepare Today • Pass Tomorrow
</p>


</footer>






<script>





let papers=[


{

subject:"Mathematics",

year:"2025",

paper:"Mathematics National Exam 2025",

pdf:"math2025.pdf",

marking:"math2025_marking.pdf"

},



{

subject:"Mathematics",

year:"2024",

paper:"Mathematics National Exam 2024",

pdf:"math2024.pdf",

marking:"math2024_marking.pdf"

},




{

subject:"Physics",

year:"2025",

paper:"Physics National Exam 2025",

pdf:"physics2025.pdf",

marking:"physics2025_marking.pdf"

},



{

subject:"Chemistry",

year:"2025",

paper:"Chemistry National Exam 2025",

pdf:"chemistry2025.pdf",

marking:"chemistry2025_marking.pdf"

},




{

subject:"Biology",

year:"2024",

paper:"Biology National Exam 2024",

pdf:"biology2024.pdf",

marking:"biology2024_marking.pdf"

}


];








function display(){


let search=

document.getElementById("search")
.value
.toLowerCase();



let subject=

document.getElementById("subjectFilter")
.value;



let year=

document.getElementById("yearFilter")
.value;



let html="";



papers.filter(p=>{


return (

p.paper.toLowerCase()
.includes(search)

&&

(subject=="All" || p.subject==subject)

&&

(year=="All" || p.year==year)

);


}).forEach(p=>{


html+=`

<div class="card">


<h3>
📄 ${p.subject}
</h3>


<p>

${p.paper}

</p>


<p>

📅 Year: ${p.year}

</p>



<button onclick="download('${p.pdf}')">

⬇ Download Paper

</button>



<button onclick="download('${p.marking}')">

✅ Marking Guide

</button>



</div>


`;



});



document.getElementById("papers")
.innerHTML=html;



}







function download(file){


window.open(
"pastpapers/"+file
);


}




function darkMode(){

document.body.classList.toggle("dark");

}





display();



</script>



</body>

</html>
