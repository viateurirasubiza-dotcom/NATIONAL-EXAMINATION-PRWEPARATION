<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Lessons | National Prep Rwanda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f8ff;
}


header{

background:#0057d9;
color:white;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;

}


header a{

color:white;
text-decoration:none;
margin-left:20px;

}



.hero{

background:linear-gradient(135deg,#0057d9,#4da3ff);
color:white;
text-align:center;
padding:60px 20px;

}


.hero h1{

font-size:45px;

}



.filters{

width:90%;
margin:30px auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}



input,select{

padding:15px;

border-radius:10px;

border:1px solid #ccc;

font-size:16px;

}



.videos{

width:90%;

margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:25px;

}



.card{

background:white;

border-radius:15px;

overflow:hidden;

box-shadow:
0 5px 15px rgba(0,0,0,.1);

}



.thumbnail{

height:160px;

background:#0057d9;

display:flex;

align-items:center;

justify-content:center;

font-size:60px;

color:white;

}



.content{

padding:20px;

}



.content h3{

color:#0057d9;

}



button{

background:#0057d9;

color:white;

border:none;

padding:12px 25px;

border-radius:8px;

cursor:pointer;

margin-top:15px;

}


button:hover{

background:#003b99;

}



footer{

background:#111;

color:white;

text-align:center;

padding:20px;

margin-top:50px;

}




.dark{

background:#111;

color:white;

}


.dark .card{

background:#222;

color:white;

}


</style>


</head>


<body>



<header>

<h2>
🇷🇼 National Prep Rwanda
</h2>


<nav>

<a href="dashboard.html">
Dashboard
</a>


<a href="subjects.html">
Subjects
</a>


<span onclick="darkMode()" style="cursor:pointer">
🌙
</span>

</nav>

</header>






<section class="hero">

<h1>
🎥 Video Lessons
</h1>

<p>
Learn from expert teachers anywhere
</p>

</section>







<div class="filters">


<input 
id="search"
placeholder="🔍 Search Video..."
onkeyup="showVideos()"
>




<select id="subject" onchange="showVideos()">

<option value="All">
All Subjects
</option>

<option>
Mathematics
</option>

<option>
Physics
</option>

<option>
Chemistry
</option>

<option>
Biology
</option>

<option>
English
</option>

<option>
Computer Science
</option>

</select>





<select id="level" onchange="showVideos()">

<option value="All">
All Levels
</option>

<option>
P6
</option>

<option>
S3
</option>

<option>
S6
</option>

</select>


</div>









<div class="videos" id="videos">

</div>









<footer>

<h3>
National Prep Rwanda
</h3>

<p>
Prepare Today • Pass Tomorrow
</p>

</footer>








<script>


let videos=[


{

title:"Algebra Introduction",

subject:"Mathematics",

level:"S3",

link:"https://youtube.com"

},


{

title:"Mechanics - Motion",

subject:"Physics",

level:"S6",

link:"https://youtube.com"

},


{

title:"Chemical Equations",

subject:"Chemistry",

level:"S3",

link:"https://youtube.com"

},



{

title:"Human Body Systems",

subject:"Biology",

level:"S6",

link:"https://youtube.com"

},



{

title:"English Grammar",

subject:"English",

level:"P6",

link:"https://youtube.com"

},



{

title:"Programming Basics",

subject:"Computer Science",

level:"S6",

link:"https://youtube.com"

}


];









function showVideos(){


let search=

document.getElementById("search")
.value
.toLowerCase();



let subject=

document.getElementById("subject")
.value;



let level=

document.getElementById("level")
.value;



let html="";




videos.filter(v=>{


return (

v.title.toLowerCase()
.includes(search)

&&

(subject=="All" || v.subject==subject)

&&

(level=="All" || v.level==level)

);


}).forEach(v=>{


html+=`

<div class="card">


<div class="thumbnail">

▶️

</div>


<div class="content">


<h3>
${v.title}
</h3>


<p>
📚 ${v.subject}
</p>


<p>
🎓 Level: ${v.level}
</p>



<button onclick="watch('${v.link}')">

Watch Video

</button>


</div>


</div>

`;



});



document.getElementById("videos")
.innerHTML=html;



}







function watch(link){

window.open(link,"_blank");

}



function darkMode(){

document.body.classList.toggle("dark");

}



showVideos();



</script>


</body>

</html>
