<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Result | National Prep Rwanda</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:linear-gradient(135deg,#0057d9,#4da3ff);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

}



.result-box{

background:white;

width:450px;

max-width:90%;

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,.2);

}



.logo{

font-size:28px;

font-weight:bold;

color:#0057d9;

margin-bottom:20px;

}



.score{

font-size:60px;

color:#0057d9;

font-weight:bold;

}



.grade{

font-size:30px;

margin:20px;

}



.remark{

font-size:22px;

color:green;

font-weight:bold;

}



.info{

background:#eef4ff;

padding:20px;

border-radius:12px;

margin:20px 0;

text-align:left;

}



button{

background:#0057d9;

color:white;

border:none;

padding:14px 25px;

border-radius:10px;

cursor:pointer;

margin:10px;

font-size:16px;

}



button:hover{

background:#003b99;

}



</style>


</head>


<body>



<div class="result-box">



<div class="logo">

🇷🇼 National Prep Rwanda

</div>



<h2>
Exam Result
</h2>


<div class="score" id="score">

0/0

</div>



<h3 id="percentage">

0%

</h3>



<div class="grade" id="grade">

Grade

</div>



<div class="remark" id="remark">

Remark

</div>




<div class="info">


<p>
📚 Subject:
<span id="subject"></span>
</p>


<p>
📅 Date:
<span id="date"></span>
</p>


<p>
⏱ Status:
Completed
</p>



</div>



<button onclick="window.print()">

🖨 Print Result

</button>


<button onclick="goDashboard()">

🏠 Dashboard

</button>



</div>






<script>


let result =
JSON.parse(
localStorage.getItem("lastResult")
);



if(result){



document.getElementById("score")
.innerHTML=
result.score+
"/"+
result.total;



let percentage =
(result.score/result.total)*100;



document.getElementById("percentage")
.innerHTML=
percentage.toFixed(0)+"%";



document.getElementById("subject")
.innerHTML=
result.subject;



document.getElementById("date")
.innerHTML=
result.date;





let grade="";

let remark="";



if(percentage>=80){

grade="A";

remark="Excellent 🎉";

}

else if(percentage>=70){

grade="B";

remark="Very Good 👍";

}

else if(percentage>=60){

grade="C";

remark="Good";

}

else if(percentage>=50){

grade="D";

remark="Pass";

}

else{

grade="F";

remark="Need More Practice";

}



document.getElementById("grade")
.innerHTML=
"Grade: "+grade;



document.getElementById("remark")
.innerHTML=
remark;



// Save History


let history=
JSON.parse(
localStorage.getItem("history")
)
||[];



history.push(result);



localStorage.setItem(
"history",
JSON.stringify(history)
);



}

else{


document.querySelector(".result-box")
.innerHTML=

"<h2>No Result Found</h2>";

}




function goDashboard(){

window.location="dashboard.html";

}



</script>


</body>

</html>
